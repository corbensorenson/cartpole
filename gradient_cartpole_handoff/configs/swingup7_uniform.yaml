experiment:
  name: swingup7_uniform
  seed: 107
  out_dir: runs/swingup7_uniform

env:
  n_links: 7
  total_length: 3.0
  total_mass: 1.0
  cart_mass: 1.0
  rail_limit: 3.0
  force_limit: 80.0
  timestep: 0.005
  frame_skip: 4
  episode_seconds: 30.0
  init_mode: hanging
  init_cart_noise: 0.0
  init_cart_vel_noise: 0.05
  init_angle_noise: 0.05
  init_vel_noise: 0.05
  terminate_abs_angle: null
  success_upright_threshold: 0.15
  success_sustain_seconds: 5.0
  cart_damping: 0.02
  cart_frictionloss: 0.0
  joint_armature: 0.0005
  link_radius: 0.025
  obs_include_morphology: true
  obs_include_frictionloss: false
  obs_include_time: false
  reward:
    alive: 0.0
    terminal_penalty: -200.0
    angle_cos: 3.0
    upright_bonus: 45.0
    sustained_upright_bonus: 10.0
    upright_streak: 12.0
    capture_quality: 8.0
    angle_abs: 1.0
    angle_rel: 0.02
    tip: 0.50
    cart_pos: 1.00
    cart_vel: 0.002
    hinge_vel: 0.0005
    control: 0.0010
    upright_threshold: 0.15
    upright_streak_cap_seconds: 5.0

morphology:
  schedule_mode: all_linear
  start:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    alpha_frictionloss: 0.0
    total_damping: 0.015
    total_frictionloss: 0.0
  end:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    alpha_frictionloss: 0.0
    total_damping: 0.015
    total_frictionloss: 0.0

ppo:
  backend: mlx
  vec_backend: subprocess
  num_envs: 48
  rollout_steps: 256
  total_updates: 10000
  minibatches: 8
  epochs: 4
  gamma: 0.995
  gae_lambda: 0.95
  learning_rate: 0.00025
  clip_coef: 0.20
  entropy_coef: 0.015
  value_coef: 0.50
  max_grad_norm: 0.50
  hidden_sizes: [256, 256]
  action_std_init: 0.45
  normalize_advantages: true
  checkpoint_every: 50
  eval_every: 50
  eval_episodes: 8
