experiment:
  name: swingup6_capture_state_curriculum_lqr_init
  seed: 613
  out_dir: runs/swingup6_capture_state_curriculum_lqr_init

env:
  n_links: 6
  total_length: 3.0
  total_mass: 1.0
  cart_mass: 1.0
  rail_limit: 3.0
  force_limit: 80.0
  timestep: 0.005
  frame_skip: 4
  episode_seconds: 15.0
  init_mode: state_list
  init_states_path: runs/swingup6_expert_chain/swing_states_low_momentum.json
  init_state_curriculum: quality_prefix
  init_state_curriculum_min_count: 1
  init_state_curriculum_power: 1.0
  init_qpos_scale_start: 0.0
  init_qpos_scale_end: 1.0
  init_qpos_cart_target: 0.0
  init_qvel_scale_start: 0.0
  init_qvel_scale_end: 1.0
  init_cart_noise: 0.015
  init_cart_vel_noise: 0.03
  init_angle_noise: 0.01
  init_vel_noise: 0.04
  terminate_abs_angle: null
  success_upright_threshold: 0.15
  success_sustain_seconds: 5.0
  cart_damping: 0.02
  joint_armature: 0.0005
  link_radius: 0.025
  obs_include_morphology: true
  curriculum_rebuild_every: 999999
  reward:
    alive: 0.0
    terminal_penalty: -300.0
    angle_cos: 2.0
    upright_bonus: 25.0
    sustained_upright_bonus: 35.0
    capture_quality: 120.0
    capture_angle_scale: 0.25
    capture_hinge_vel_scale: 1.10
    capture_cart_pos_scale: 0.50
    capture_cart_vel_scale: 0.75
    upright_low_velocity_bonus: 30.0
    upright_hinge_vel_threshold: 0.75
    upright_cart_vel_threshold: 0.50
    centered_upright_max_cart_abs: 1.25
    low_momentum_max_cart_abs: 1.25
    centered_upright_streak: 80.0
    centered_upright_streak_cap_seconds: 5.0
    low_momentum_upright_streak: 120.0
    low_momentum_upright_streak_cap_seconds: 5.0
    angle_abs: 1.0
    angle_rel: 0.04
    tip: 0.25
    cart_pos: 8.0
    cart_vel: 0.03
    hinge_vel: 0.006
    rail_margin: 220.0
    rail_margin_start: 0.55
    control: 0.0015
    upright_threshold: 0.15

morphology:
  schedule_mode: all_linear
  start:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015
  end:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015

ppo:
  backend: mlx
  vec_backend: subprocess
  num_envs: 48
  rollout_steps: 256
  total_updates: 5000
  minibatches: 8
  epochs: 4
  gamma: 0.995
  gae_lambda: 0.95
  learning_rate: 0.00010
  clip_coef: 0.15
  entropy_coef: 0.002
  value_coef: 0.50
  max_grad_norm: 0.50
  # Keep this compatible with the finite-difference LQR checkpoint produced by
  # make_lqr_checkpoint.py, then let PPO fine-tune that stabilizer through the
  # backward state-list curriculum.
  hidden_sizes: []
  action_std_init: 0.03
  normalize_advantages: true
  checkpoint_every: 50
  eval_every: 50
  eval_episodes: 8
