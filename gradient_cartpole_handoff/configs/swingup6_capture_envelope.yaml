experiment:
  name: swingup6_capture_envelope
  seed: 61101
  out_dir: runs/swingup6_capture_envelope

env:
  n_links: 6
  total_length: 3.0
  total_mass: 1.0
  cart_mass: 1.0
  rail_limit: 3.0
  force_limit: 80.0
  timestep: 0.005
  frame_skip: 4
  episode_seconds: 15.0
  init_mode: state_list
  init_states_path: runs/p1_capture_envelope/train.json
  init_state_curriculum: all
  init_qpos_scale_start: 0.0
  init_qpos_scale_end: 1.0
  init_qpos_scale_power: 2.0
  init_qpos_cart_target: 0.0
  init_qvel_scale_start: 0.0
  init_qvel_scale_end: 1.0
  init_qvel_scale_power: 2.0
  init_cart_noise: 0.0
  init_cart_vel_noise: 0.0
  init_angle_noise: 0.0
  init_vel_noise: 0.0
  terminate_abs_angle: null
  success_upright_threshold: 0.15
  success_sustain_seconds: 5.0
  cart_damping: 0.02
  cart_frictionloss: 0.0
  joint_armature: 0.0005
  link_radius: 0.025
  obs_include_morphology: true
  obs_include_frictionloss: false
  obs_include_time: false
  curriculum_rebuild_every: 999999
  action_lqr_residual:
    enabled: true
    state_gain:
      - 0.0026855778085728157
      - 0.15758761422283657
      - 14.455636468232036
      - -83.94679040035219
      - 248.12862206917
      - -336.48826201022246
      - 179.8300161087529
      - 0.014843753044057018
      - 0.45427958143390795
      - 0.6167729622934034
      - -1.5600337751836524
      - 10.65066300949248
      - -21.451701886956194
      - 17.05171607427916
    scale_start: 1.2
    scale_end: 0.02
    scale_power: 4.0
    residual_scale_start: 0.0
    residual_scale_end: 1.0
    residual_scale_power: 2.0
    cart_target: 0.0
  reward:
    alive: 0.0
    terminal_penalty: -100.0
    angle_cos: 0.2
    upright_bonus: 1.0
    sustained_upright_bonus: 0.5
    capture_quality: 1.0
    capture_angle_scale: 0.20
    capture_hinge_vel_scale: 0.75
    capture_cart_pos_abs_scale: 1.25
    capture_cart_vel_scale: 0.50
    upright_low_velocity_bonus: 1.0
    upright_hinge_vel_threshold: 0.75
    upright_cart_vel_threshold: 0.50
    centered_upright_max_cart_abs: 1.25
    low_momentum_max_cart_abs: 1.25
    upright_streak: 0.1
    upright_streak_cap_seconds: 10.0
    centered_upright_streak: 0.1
    centered_upright_streak_cap_seconds: 10.0
    low_momentum_upright_streak: 0.1
    low_momentum_upright_streak_cap_seconds: 10.0
    angle_abs: 1.0
    angle_rel: 0.05
    tip: 0.25
    cart_pos: 10.0
    cart_vel: 0.50
    hinge_vel: 0.05
    rail_margin: 100.0
    rail_margin_start: 0.50
    control: 0.0100
    upright_threshold: 0.15

morphology:
  schedule_mode: all_linear
  start:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    alpha_frictionloss: 0.0
    total_damping: 0.015
    total_frictionloss: 0.0
  end:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    alpha_frictionloss: 0.0
    total_damping: 0.015
    total_frictionloss: 0.0

ppo:
  backend: mlx
  vec_backend: serial
  num_envs: 48
  rollout_steps: 256
  total_updates: 5000
  minibatches: 8
  epochs: 4
  gamma: 0.997
  gae_lambda: 0.95
  learning_rate: 0.00005
  clip_coef: 0.20
  entropy_coef: 0.0005
  value_coef: 0.50
  max_grad_norm: 0.50
  hidden_sizes: [256, 256]
  action_std_init: 0.08
  zero_init_actor_output: true
  normalize_advantages: true
  checkpoint_every: 50
  eval_every: 25
  eval_episodes: 256
  curriculum_eval_states_path: runs/p1_capture_envelope/validation.json
  curriculum_eval_seed: 61201
  curriculum_eval_batch_size: 64
  curriculum_mode: gated
  curriculum_start_progress: 0.025
  curriculum_step: 0.025
  curriculum_min_updates_per_stage: 25
  curriculum_gate_success_rate: 0.90
  curriculum_gate_ever_upright_rate: 0.90
  curriculum_gate_low_momentum_upright_rate: 0.90
  curriculum_gate_mean_upright_streak: 8.0
  curriculum_gate_max_upright_streak: 10.0
  curriculum_gate_max_capture_quality: 0.70
  eval_progress: current
