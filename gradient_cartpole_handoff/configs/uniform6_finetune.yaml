experiment:
  name: uniform6_finetune
  seed: 43
  out_dir: runs/uniform6_finetune

env:
  n_links: 6
  total_length: 3.0
  total_mass: 1.0
  cart_mass: 1.0
  rail_limit: 3.0
  force_limit: 80.0
  timestep: 0.005
  frame_skip: 4
  episode_seconds: 30.0
  init_angle_noise: 0.040
  init_vel_noise: 0.015
  terminate_abs_angle: 1.25
  cart_damping: 0.02
  joint_armature: 0.0005
  link_radius: 0.025
  obs_include_morphology: true
  curriculum_rebuild_every: 999999
  reward:
    alive: 1.0
    upright_bonus: 1.0
    angle_abs: 2.5
    angle_rel: 0.15
    cart_pos: 0.10
    cart_vel: 0.005
    hinge_vel: 0.001
    control: 0.0003
    upright_threshold: 0.10

morphology:
  schedule_mode: all_linear
  start:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015
  end:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015

ppo:
  backend: mlx
  vec_backend: subprocess
  num_envs: 48
  rollout_steps: 256
  total_updates: 2000
  minibatches: 8
  epochs: 4
  gamma: 0.995
  gae_lambda: 0.95
  learning_rate: 0.00015
  clip_coef: 0.15
  entropy_coef: 0.004
  value_coef: 0.50
  max_grad_norm: 0.50
  hidden_sizes: [256, 256]
  action_std_init: 0.55
  normalize_advantages: true
  checkpoint_every: 50
  eval_every: 50
  eval_episodes: 8
