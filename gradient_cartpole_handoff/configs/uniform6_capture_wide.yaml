experiment:
  name: uniform6_capture_wide
  seed: 701
  out_dir: runs/uniform6_capture_wide

env:
  n_links: 6
  total_length: 3.0
  total_mass: 1.0
  cart_mass: 1.0
  rail_limit: 3.0
  force_limit: 80.0
  timestep: 0.005
  frame_skip: 4
  episode_seconds: 15.0
  # Robust capture/stabilize subproblem for the final uniform plant. This is
  # still not swing-up: starts near upright, then widens toward the handoff
  # angle/velocity range that the swing expert currently produces.
  init_mode: upright
  init_cart_noise_start: 0.00
  init_cart_noise_end: 0.30
  init_cart_vel_noise_start: 0.00
  init_cart_vel_noise_end: 0.60
  init_angle_noise_start: 0.005
  init_angle_noise_end: 0.12
  init_vel_noise_start: 0.005
  init_vel_noise_end: 0.35
  terminate_abs_angle: null
  success_upright_threshold: 0.15
  success_sustain_seconds: 5.0
  cart_damping: 0.02
  joint_armature: 0.0005
  link_radius: 0.025
  obs_include_morphology: true
  curriculum_rebuild_every: 999999
  action_lqr_residual:
    enabled: true
    state_gain:
      - 0.0026855778085728157
      - 0.15758761422283657
      - 14.455636468232036
      - -83.94679040035219
      - 248.12862206917
      - -336.48826201022246
      - 179.8300161087529
      - 0.014843753044057018
      - 0.45427958143390795
      - 0.6167729622934034
      - -1.5600337751836524
      - 10.65066300949248
      - -21.451701886956194
      - 17.05171607427916
    scale: 0.02
    residual_scale_start: 0.75
    residual_scale_end: 1.25
    cart_target: 0.0
  reward:
    alive: 0.0
    terminal_penalty: -300.0
    angle_cos: 2.0
    upright_bonus: 30.0
    sustained_upright_bonus: 45.0
    capture_quality: 160.0
    capture_angle_scale: 0.25
    capture_hinge_vel_scale: 0.90
    capture_cart_pos_scale: 0.45
    capture_cart_vel_scale: 0.60
    upright_low_velocity_bonus: 45.0
    upright_hinge_vel_threshold: 0.75
    upright_cart_vel_threshold: 0.50
    centered_upright_max_cart_abs: 1.25
    low_momentum_max_cart_abs: 1.25
    centered_upright_streak: 100.0
    centered_upright_streak_cap_seconds: 5.0
    low_momentum_upright_streak: 140.0
    low_momentum_upright_streak_cap_seconds: 5.0
    angle_abs: 1.0
    angle_rel: 0.04
    tip: 0.25
    cart_pos: 8.0
    cart_vel: 0.04
    hinge_vel: 0.008
    rail_margin: 220.0
    rail_margin_start: 0.55
    control: 0.0015
    upright_threshold: 0.15

morphology:
  schedule_mode: all_linear
  start:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015
  end:
    alpha_length: 0.0
    alpha_mass: 0.0
    alpha_damping: 0.0
    total_damping: 0.015

ppo:
  backend: mlx
  vec_backend: subprocess
  num_envs: 48
  rollout_steps: 256
  total_updates: 5000
  minibatches: 8
  epochs: 4
  gamma: 0.995
  gae_lambda: 0.95
  learning_rate: 0.00020
  clip_coef: 0.20
  entropy_coef: 0.006
  value_coef: 0.50
  max_grad_norm: 0.50
  hidden_sizes: [256, 256]
  action_std_init: 0.30
  normalize_advantages: true
  checkpoint_every: 50
  eval_every: 50
  eval_episodes: 8
  # Train on a linear widening-noise curriculum, but select checkpoints by the
  # final wide-noise capture task rather than the easy early stages.
  eval_progress: final
